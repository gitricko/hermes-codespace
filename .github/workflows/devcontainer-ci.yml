name: Dev Container CI

on:
  push:
    branches: [main, readme]
  pull_request:
    branches: [main]

jobs:
  test-devcontainer:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build dev container
        uses: devcontainers/ci@v0.3
        with:
          imageName: hermes-codespace-test-${{ github.run_id }}
          push: never
          runCmd: |
            set -e
            echo "=== Verifying dev container builds and basic tools available ==="

            # Verify base tools installed by devcontainer features
            python3 --version
            node --version
            npm --version

            # Verify scripts exist and are executable
            test -f .devcontainer/post-create-cmd.sh
            test -f .devcontainer/start-hermes.sh
            test -f .devcontainer/self-check.sh
            test -x .devcontainer/post-create-cmd.sh
            test -x .devcontainer/start-hermes.sh
            test -x .devcontainer/self-check.sh

            echo "=== Dev container build successful, scripts present ==="